name: Convert Markdown to PDF

# Controls when the action will run
on:
  push:
    branches: [ main, master ] # Triggers on push to main or master branches
  workflow_dispatch:          # Allows you to click a button to run this manually

jobs:
  convert_to_pdf:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out your repository code so the runner can see your files
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Run the PDF converter tool
      - name: Convert MD to PDF
        uses: baileyjm02/markdown-to-pdf@v1.2.0
        with:
          input_path: SJ  # Change this if your file or directory of files has a different name
          output_dir: pdf-output
        

      # Step 3: Upload the PDF so you can download it from the GitHub Actions dashboard
      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: converted-pdf-document
          path: pdf-output/
